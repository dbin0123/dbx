dialect:
  name: "ClickHouse"
  display_name: "ClickHouse"
  versions:
    - version: "24"
      status: "RECOMMENDED"

types:
  - name: "UInt8"
    category: "INTEGER"
    aliases: ["TINYINT"]
  - name: "UInt16"
    category: "INTEGER"
    aliases: ["SMALLINT"]
  - name: "UInt32"
    category: "INTEGER"
    aliases: ["INT", "INTEGER"]
  - name: "UInt64"
    category: "INTEGER"
    aliases: ["BIGINT"]
  - name: "Int8"
    category: "INTEGER"
  - name: "Int16"
    category: "INTEGER"
  - name: "Int32"
    category: "INTEGER"
  - name: "Int64"
    category: "INTEGER"
  - name: "Int128"
    category: "INTEGER"
    semantic_fidelity_base: 0.6
  - name: "Int256"
    category: "INTEGER"
    semantic_fidelity_base: 0.5
  - name: "Float32"
    category: "FLOAT"
    aliases: ["FLOAT"]
  - name: "Float64"
    category: "FLOAT"
    aliases: ["DOUBLE"]
  - name: "Decimal"
    category: "DECIMAL"
    has_precision: true
    aliases: ["NUMERIC"]
  - name: "String"
    category: "STRING"
    aliases: ["VARCHAR", "TEXT"]
  - name: "FixedString"
    category: "STRING"
    semantic_fidelity_base: 0.9
  - name: "UUID"
    category: "UUID"
  - name: "Date"
    category: "DATE"
  - name: "Date32"
    category: "DATE"
    semantic_fidelity_base: 0.9
  - name: "DateTime"
    category: "DATETIME"
    aliases: ["TIMESTAMP"]
  - name: "DateTime64"
    category: "DATETIME"
    semantic_fidelity_base: 0.9
  - name: "Enum"
    category: "ENUM"
    semantic_fidelity_base: 0.8
  - name: "Array"
    category: "ARRAY"
    semantic_fidelity_base: 0.5
  - name: "Map"
    category: "MAP"
    semantic_fidelity_base: 0.3
  - name: "Tuple"
    category: "TUPLE"
    semantic_fidelity_base: 0.3
  - name: "Nullable"
    category: "NULLABLE"
    semantic_fidelity_base: 0.9
  - name: "LowCardinality"
    category: "STRING"
    semantic_fidelity_base: 0.8
  - name: "JSON"
    category: "JSON"
  - name: "IPv4"
    category: "NETWORK"
    semantic_fidelity_base: 0.3
  - name: "IPv6"
    category: "NETWORK"
    semantic_fidelity_base: 0.3
  - name: "Point"
    category: "SPATIAL"
  - name: "Ring"
    category: "SPATIAL"
  - name: "Polygon"
    category: "SPATIAL"

ddl_capabilities:
  add_column: true
  drop_column: true
  rename_column: true
  alter_column_type: true
  reorder_column: true
  comment: true
  create_table: true
  drop_table: true
  truncate_table: true
  if_not_exists: true
  temporary_table: true
  templates:
    add_column: "ALTER TABLE {table} ADD COLUMN {column} {type}"
    drop_column: "ALTER TABLE {table} DROP COLUMN {column}"
    rename_column: "ALTER TABLE {table} RENAME COLUMN {old} TO {new}"
    modify_column: "ALTER TABLE {table} MODIFY COLUMN {column} {type}"
    create_table: "CREATE TABLE IF NOT EXISTS {table} ({columns}) ENGINE = MergeTree() ORDER BY tuple()"
    drop_table: "DROP TABLE IF EXISTS {table}"
    create_index: "ALTER TABLE {table} ADD INDEX {name} {columns} TYPE minmax GRANULARITY 1"
    drop_index: "ALTER TABLE {table} DROP INDEX {name}"

rollback_templates:
  add_column: "ALTER TABLE {table} DROP COLUMN {column}"
  drop_column: "ALTER TABLE {table} ADD COLUMN {column} {original_type}"
  rename_column: "ALTER TABLE {table} RENAME COLUMN {new} TO {old}"
  modify_column: "ALTER TABLE {table} MODIFY COLUMN {column} {original_type}"
  create_table: "DROP TABLE IF EXISTS {table}"
  drop_table: "-- Restore from backup: {table}"

online_safety:
  add_column:
    level: "NON_BLOCKING"
    cost: "LOW"
  modify_column:
    level: "BLOCKING_LONG"
    cost: "MEDIUM"
  drop_column:
    level: "BLOCKING_SHORT"
    cost: "LOW"
  drop_table:
    level: "REQUIRES_GHOST"
    cost: "HIGH"
  truncate:
    level: "REQUIRES_GHOST"
    cost: "HIGH"

destruction_level:
  drop_table: "FATAL"
  truncate: "DANGEROUS"
  drop_column: "DANGEROUS"
  alter_type: "MODIFY"
  add_column: "SAFE"
  create_table: "SAFE"

structural_capabilities:
  supports_schemas: true
  max_columns_per_table: 1000
  max_query_size_bytes: 268435456
  max_foreign_key_name_length: 256
  supports_full_text_index: true
  supports_partitioning: true
  supports_table_sampling: true
  supports_array_type: true
  supports_json_type: true
  supports_enum_type: true
  supports_uuid_type: true

identifier_rules:
  quote_char: '"'
  case_sensitive: true
  max_length: 256

metadata_queries:
  list_tables:
    sql: "SELECT name FROM system.tables WHERE database = '{schema}'"
    performance_profile: "LIGHT"
  list_columns:
    sql: "SELECT name, type, is_nullable, default_expression FROM system.columns WHERE database = '{schema}' AND table = '{table}'"
    performance_profile: "MEDIUM"
  dependencies:
    sql: "SELECT table FROM system.columns WHERE database = '{schema}'"
    depth_support: 0
    performance_profile: "LIGHT"

pre_execution_checks:
  - name: "mutation_sync"
    sql: "SELECT 1"
