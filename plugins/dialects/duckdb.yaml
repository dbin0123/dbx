dialect:
  name: "DuckDB"
  display_name: "DuckDB"
  versions:
    - version: "1"
      status: "RECOMMENDED"

types:
  - name: "TINYINT"
    category: "INTEGER"
  - name: "SMALLINT"
    category: "INTEGER"
  - name: "INTEGER"
    category: "INTEGER"
    aliases: ["INT", "INT4"]
  - name: "BIGINT"
    category: "INTEGER"
    aliases: ["INT8"]
  - name: "HUGEINT"
    category: "INTEGER"
    semantic_fidelity_base: 0.6
  - name: "FLOAT"
    category: "FLOAT"
    aliases: ["FLOAT4", "REAL"]
  - name: "DOUBLE"
    category: "FLOAT"
    aliases: ["FLOAT8"]
  - name: "DECIMAL"
    category: "DECIMAL"
    has_precision: true
    aliases: ["NUMERIC"]
  - name: "VARCHAR"
    category: "STRING"
    has_length: true
  - name: "CHAR"
    category: "STRING"
    has_length: true
  - name: "BLOB"
    category: "BINARY"
    aliases: ["BYTEA", "BINARY", "VARBINARY"]
  - name: "BOOLEAN"
    category: "BOOLEAN"
    aliases: ["BOOL"]
  - name: "DATE"
    category: "DATE"
  - name: "TIME"
    category: "TIME"
  - name: "TIMESTAMP"
    category: "DATETIME"
    aliases: ["DATETIME"]
  - name: "TIMESTAMP WITH TIME ZONE"
    category: "DATETIME"
    aliases: ["TIMESTAMPTZ"]
  - name: "INTERVAL"
    category: "INTERVAL"
    semantic_fidelity_base: 0.7
  - name: "UUID"
    category: "UUID"
  - name: "JSON"
    category: "JSON"
  - name: "LIST"
    category: "ARRAY"
    semantic_fidelity_base: 0.4
  - name: "MAP"
    category: "MAP"
    semantic_fidelity_base: 0.3
  - name: "STRUCT"
    category: "STRUCT"
    semantic_fidelity_base: 0.3
  - name: "ENUM"
    category: "ENUM"
    semantic_fidelity_base: 0.7
  - name: "UNION"
    category: "UNION"
    semantic_fidelity_base: 0.2

ddl_capabilities:
  add_column: true
  drop_column: true
  rename_column: true
  create_index: true
  drop_index: true
  rebuild_index: true
  create_table: true
  drop_table: true
  truncate_table: true
  if_not_exists: true
  create_or_replace: true
  temporary_table: true
  templates:
    add_column: "ALTER TABLE {table} ADD COLUMN {column} {type}"
    drop_column: "ALTER TABLE {table} DROP COLUMN {column}"
    rename_column: "ALTER TABLE {table} RENAME COLUMN {old} TO {new}"
    create_table: "CREATE TABLE IF NOT EXISTS {table} ({columns})"
    drop_table: "DROP TABLE IF EXISTS {table}"
    create_index: "CREATE INDEX IF NOT EXISTS {name} ON {table} ({columns})"
    drop_index: "DROP INDEX IF EXISTS {name}"

rollback_templates:
  add_column: "ALTER TABLE {table} DROP COLUMN {column}"
  drop_column: "ALTER TABLE {table} ADD COLUMN {column} {original_type}"
  rename_column: "ALTER TABLE {table} RENAME COLUMN {new} TO {old}"
  create_table: "DROP TABLE IF EXISTS {table}"
  drop_table: "-- Restore from backup: {table}"

online_safety:
  add_column:
    level: "NON_BLOCKING"
    cost: "LOW"
  modify_column:
    level: "BLOCKING_SHORT"
    cost: "LOW"
  drop_table:
    level: "REQUIRES_GHOST"
    cost: "HIGH"
  truncate:
    level: "REQUIRES_GHOST"
    cost: "HIGH"

destruction_level:
  drop_table: "FATAL"
  truncate: "DANGEROUS"
  drop_column: "DANGEROUS"
  alter_type: "SAFE"
  add_column: "SAFE"
  create_table: "SAFE"

structural_capabilities:
  supports_schemas: true
  max_columns_per_table: 1600
  max_indexes_per_table: 100
  max_query_size_bytes: 268435456
  max_foreign_key_name_length: 255
  supports_spatial_index: true
  supports_partitioning: true
  supports_table_sampling: true
  supports_on_update_cascade: true
  supports_on_delete_set_null: true
  supports_array_type: true
  supports_json_type: true
  supports_enum_type: true
  supports_uuid_type: true
  supports_sequences: true

identifier_rules:
  quote_char: '"'
  case_sensitive: false
  max_length: 255

metadata_queries:
  list_tables:
    sql: "SELECT table_name FROM information_schema.tables WHERE table_schema = '{schema}'"
    performance_profile: "LIGHT"
  list_columns:
    sql: "SELECT column_name, data_type, is_nullable, column_default FROM information_schema.columns WHERE table_schema = '{schema}' AND table_name = '{table}' ORDER BY ordinal_position"
    performance_profile: "MEDIUM"
  list_sequences:
    sql: "SELECT sequence_name FROM information_schema.sequences WHERE sequence_schema = '{schema}'"
    performance_profile: "LIGHT"
  dependencies:
    sql: "SELECT table_name FROM information_schema.tables WHERE table_schema = '{schema}'"
    depth_support: 1
    performance_profile: "MEDIUM"
